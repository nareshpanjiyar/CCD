<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Dashboard</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4"><i class="fas fa-tachometer-alt me-2"></i>Admin Dashboard</h2>

    <!-- Stats Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3 col-sm-6">
            <div class="card stats-card bg-primary text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Total Patients</h6>
                            <h2 class="mb-0" th:text="${totalPatients}"></h2>
                        </div>
                        <i class="fas fa-users fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6">
            <div class="card stats-card bg-success text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Total Doctors</h6>
                            <h2 class="mb-0" th:text="${totalDoctors}"></h2>
                        </div>
                        <i class="fas fa-user-md fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6">
            <div class="card stats-card bg-warning text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Appointments</h6>
                            <h2 class="mb-0" th:text="${totalAppointments}"></h2>
                        </div>
                        <i class="fas fa-calendar-check fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6">
            <div class="card stats-card bg-info text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Revenue (₹)</h6>
                            <h2 class="mb-0" th:text="${#numbers.formatDecimal(totalRevenue, 1, 2)}"></h2>
                        </div>
                        <i class="fas fa-rupee-sign fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Second Row -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card stats-card bg-danger text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div><h6>Low Stock</h6><h2 th:text="${lowStockCount}"></h2></div>
                        <i class="fas fa-exclamation-triangle fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stats-card bg-secondary text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div><h6>Pending Bills</h6><h2 th:text="${pendingBills}"></h2></div>
                        <i class="fas fa-file-invoice fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stats-card bg-dark text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div><h6>Receptionists</h6><h2 th:text="${totalReceptionists}"></h2></div>
                        <i class="fas fa-user-tie fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Appointments Table -->
    <div class="card">
        <div class="card-header bg-white d-flex justify-content-between">
            <h5 class="mb-0"><i class="fas fa-calendar-alt me-2"></i>Recent Appointments</h5>
            <a th:href="@{/admin/appointments}" class="btn btn-sm btn-outline-primary">View All</a>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Patient</th><th>Doctor</th><th>Date & Time</th><th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="appt : ${recentAppointments}">
                            <td th:text="${appt.patient.name}"></td>
                            <td th:text="${appt.doctor.name}"></td>
                            <td th:text="${#temporals.format(appt.appointmentDate, 'MMM dd, yyyy hh:mm a')}"></td>
                            <td>
                                <span class="badge" th:classappend="|bg-${appt.status == 'Scheduled' ? 'primary' : (appt.status == 'Completed' ? 'success' : 'danger')}|" th:text="${appt.status}"></span>
                            </td>
                        </tr>
                        <tr th:if="${recentAppointments.empty}">
                            <td colspan="4" class="text-center">No recent appointments</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
