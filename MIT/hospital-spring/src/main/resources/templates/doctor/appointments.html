<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>My Appointments</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4"><i class="fas fa-calendar-check me-2"></i>My Appointments</h2>

    <!-- Alert Messages -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search & Filter -->
    <div class="filter-section">
        <div class="row g-3 align-items-end">
            <div class="col-md-5">
                <label class="form-label fw-semibold">Search</label>
                <input type="text" id="searchInput" class="form-control" placeholder="Patient name...">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold">Status</label>
                <select id="statusFilter" class="form-select">
                    <option value="all">All</option>
                    <option value="Scheduled">Scheduled</option>
                    <option value="Completed">Completed</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold">Date</label>
                <input type="date" id="dateFilter" class="form-control">
            </div>
            <div class="col-md-1">
                <button class="btn btn-outline-secondary w-100" onclick="clearFilters()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Appointments List -->
    <div class="row g-3" id="appointmentsList">
        <div class="col-12" th:each="appt : ${appointments}">
            <div class="card appointment-card border-0 shadow-sm">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-3">
                            <h5 class="mb-1" th:text="${appt.patient.name}"></h5>
                            <p class="mb-0 text-muted" th:text="${appt.patient.phone}"></p>
                        </div>
                        <div class="col-md-3">
                            <i class="fas fa-clock text-primary me-2"></i>
                            <span th:text="${#temporals.format(appt.appointmentDate, 'MMM dd, yyyy hh:mm a')}"></span>
                        </div>
                        <div class="col-md-3">
                            <strong>Reason:</strong> <span th:text="${appt.reason} ?: 'Not specified'"></span>
                        </div>
                        <div class="col-md-2">
                            <span class="badge" th:classappend="|bg-${appt.status == 'Scheduled' ? 'primary' : (appt.status == 'Completed' ? 'success' : 'danger')}|"
                                  th:text="${appt.status}"></span>
                        </div>
                        <div class="col-md-1 text-end">
                            <div class="dropdown">
                                <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="dropdown">
                                    <i class="fas fa-ellipsis-v"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li>
                                        <button class="dropdown-item" onclick="openStatusModal([[${appt.id}]], '[[${appt.status}]]')">
                                            <i class="fas fa-tag me-2"></i>Update Status
                                        </button>
                                    </li>
                                    <li th:if="${appt.status == 'Scheduled'}">
                                        <a class="dropdown-item" th:href="@{/doctor/prescriptions/new(patientId=${appt.patient.id}, appointmentId=${appt.id})}">
                                            <i class="fas fa-prescription me-2"></i>Write Prescription
                                        </a>
                                    </li>
                                    <li>
                                        <a class="dropdown-item" th:href="@{/doctor/patient-history(patientId=${appt.patient.id})}">
                                            <i class="fas fa-history me-2"></i>View History
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${appointments.empty}" class="col-12">
            <div class="alert alert-info">No appointments found.</div>
        </div>
    </div>

    <!-- Status Update Modal -->
    <div class="modal fade" id="statusModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <form th:action="@{/doctor/appointments/update-status}" method="post">
                    <input type="hidden" name="appointmentId" id="appointmentId">
                    <div class="modal-header">
                        <h5 class="modal-title">Update Status</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <select class="form-select" name="status" id="statusSelect">
                            <option value="Scheduled">Scheduled</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
    function openStatusModal(id, currentStatus) {
        document.getElementById('appointmentId').value = id;
        document.getElementById('statusSelect').value = currentStatus;
        new bootstrap.Modal(document.getElementById('statusModal')).show();
    }

    // Filter logic (simplified - full version in script.js)
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');
    const dateFilter = document.getElementById('dateFilter');
    const cards = document.querySelectorAll('#appointmentsList .col-12');

    function filterCards() {
        const term = searchInput.value.toLowerCase();
        const status = statusFilter.value;
        const date = dateFilter.value;
        cards.forEach(card => {
            const name = card.querySelector('h5')?.textContent.toLowerCase() || '';
            const badge = card.querySelector('.badge');
            const cardStatus = badge ? badge.textContent.trim() : '';
            const dateText = card.querySelector('.fa-clock + span')?.textContent.trim() || '';
            let show = term === '' || name.includes(term);
            if (status !== 'all' && cardStatus !== status) show = false;
            if (date && !dateText.includes(date)) show = false;
            card.style.display = show ? '' : 'none';
        });
    }

    searchInput.addEventListener('keyup', filterCards);
    statusFilter.addEventListener('change', filterCards);
    dateFilter.addEventListener('change', filterCards);

    function clearFilters() {
        searchInput.value = '';
        statusFilter.value = 'all';
        dateFilter.value = '';
        filterCards();
    }
</script>
</th:block>
</body>
</html>
