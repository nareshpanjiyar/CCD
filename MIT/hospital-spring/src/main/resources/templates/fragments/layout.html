<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - CarePoint Hospital">CarePoint Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar based on role -->
        <div sec:authorize="hasRole('ADMIN')" th:replace="~{fragments/sidebar-admin :: sidebar-admin}"></div>
        <div sec:authorize="hasRole('DOCTOR')" th:replace="~{fragments/sidebar-doctor :: sidebar-doctor}"></div>
        <div sec:authorize="hasRole('PATIENT')" th:replace="~{fragments/sidebar-patient :: sidebar-patient}"></div>
        <div sec:authorize="hasRole('RECEPTIONIST')" th:replace="~{fragments/sidebar-receptionist :: sidebar-receptionist}"></div>

        <div id="content">
            <!-- Navbar -->
            <div th:replace="~{fragments/navbar :: navbar}"></div>

            <!-- Main content injected here -->
            <div layout:fragment="content"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
