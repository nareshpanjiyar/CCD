<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- Admin Sidebar Fragment -->
    <nav id="sidebar" class="bg-dark text-white" th:fragment="sidebar-admin">
        <div class="sidebar-header p-3">
            <h4><i class="fas fa-hospital me-2"></i>HMS Admin</h4>
        </div>
        <ul class="list-unstyled components">
            <li th:classappend="${#strings.contains(currentPage, 'dashboard')} ? 'active'">
                <a th:href="@{/admin/dashboard}">
                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                </a>
            </li>
            <li th:classappend="${#strings.contains(currentPage, 'patients')} ? 'active'">
                <a th:href="@{/admin/patients}">
                    <i class="fas fa-users me-2"></i>Patients
                </a>
            </li>
            <li th:classappend="${#strings.contains(currentPage, 'doctors')} ? 'active'">
                <a th:href="@{/admin/doctors}">
                    <i class="fas fa-user-md me-2"></i>Doctors
                </a>
            </li>
            <li th:classappend="${#strings.contains(currentPage, 'appointments')} ? 'active'">
                <a th:href="@{/admin/appointments}">
                    <i class="fas fa-calendar-check me-2"></i>Appointments
                </a>
            </li>
            <li th:classappend="${#strings.contains(currentPage, 'drugs')} ? 'active'">
                <a th:href="@{/admin/drugs}">
                    <i class="fas fa-pills me-2"></i>Drug Inventory
                </a>
            </li>
            <li th:classappend="${#strings.contains(currentPage, 'prescriptions')} ? 'active'">
                <a th:href="@{/admin/prescriptions}">
                    <i class="fas fa-prescription me-2"></i>Prescriptions
                </a>
            </li>
            <li th:classappend="${#strings.contains(currentPage, 'billing')} ? 'active'">
                <a th:href="@{/admin/billing}">
                    <i class="fas fa-file-invoice-dollar me-2"></i>Billing
                </a>
            </li>
            <li th:classappend="${#strings.contains(currentPage, 'receptionists')} ? 'active'">
                <a th:href="@{/admin/receptionists}">
                    <i class="fas fa-user-tie me-2"></i>Receptionists
                </a>
            </li>
            <li th:classappend="${#strings.contains(currentPage, 'admissions')} ? 'active'">
                <a th:href="@{/admin/admissions}">
                    <i class="fas fa-procedures me-2"></i>Admissions
                </a>
            </li>
            <li>
                <a th:href="@{/logout}">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </a>
            </li>
        </ul>
    </nav>
</body>
</html>
