<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Appointments Management</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-calendar-check me-2"></i>Appointments Management</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#appointmentModal" onclick="resetForm()">
            <i class="fas fa-plus-circle me-2"></i>Book New Appointment
        </button>
    </div>

    <!-- Alert Messages -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search & Filter -->
    <div class="filter-section">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label fw-semibold"><i class="fas fa-search me-1"></i>Search</label>
                <input type="text" id="searchInput" class="form-control" placeholder="Patient, doctor...">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold"><i class="fas fa-filter me-1"></i>Status</label>
                <select id="statusFilter" class="form-select">
                    <option value="all">All</option>
                    <option value="Scheduled">Scheduled</option>
                    <option value="Completed">Completed</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold"><i class="fas fa-calendar me-1"></i>Date</label>
                <input type="date" id="dateFilter" class="form-control">
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-secondary w-100" onclick="clearFilters()">
                    <i class="fas fa-times me-1"></i>Clear
                </button>
            </div>
        </div>
    </div>

    <!-- Appointments Table -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 searchable-table" id="appointmentsTable">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Patient</th>
                            <th>Doctor</th>
                            <th>Date & Time</th>
                            <th>Reason</th>
                            <th>Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="appt : ${appointments}">
                            <td th:text="${appt.id}"></td>
                            <td th:text="${appt.patient.name}"></td>
                            <td th:text="${appt.doctor.name}"></td>
                            <td th:text="${#temporals.format(appt.appointmentDate, 'MMM dd, yyyy hh:mm a')}"></td>
                            <td th:text="${appt.reason} ?: '—'"></td>
                            <td>
                                <span class="badge status-badge" 
                                      th:classappend="${appt.status == 'Scheduled' ? 'bg-primary' : (appt.status == 'Completed' ? 'bg-success' : 'bg-danger')}"
                                      th:text="${appt.status}"></span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary edit-btn"
                                        th:attr="data-id=${appt.id}, data-patient=${appt.patient.id}, data-doctor=${appt.doctor.id}, data-date=${#temporals.format(appt.appointmentDate, 'yyyy-MM-dd\'T\'HH:mm')}, data-reason=${appt.reason}, data-status=${appt.status}">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <a th:href="@{/admin/appointments/delete/{id}(id=${appt.id})}" 
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirmDelete('Delete this appointment?')">
                                    <i class="fas fa-trash-alt"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${appointments.empty}">
                            <td colspan="7" class="text-center py-4 text-muted">No appointments found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="appointmentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:action="@{/admin/appointments/save}" method="post" th:object="${appointmentDto}">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="modalTitle">Book Appointment</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" th:field="*{id}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label>Patient *</label>
                                <select class="form-select" th:field="*{patientId}" required>
                                    <option value="">Select Patient</option>
                                    <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.name}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label>Doctor *</label>
                                <select class="form-select" th:field="*{doctorId}" required>
                                    <option value="">Select Doctor</option>
                                    <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.name} + ' (' + ${d.specialization} + ')'"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label>Date & Time *</label>
                                <input type="datetime-local" class="form-control" th:field="*{appointmentDate}" required>
                            </div>
                            <div class="col-md-6">
                                <label>Status</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="Scheduled">Scheduled</option>
                                    <option value="Completed">Completed</option>
                                    <option value="Cancelled">Cancelled</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label>Reason</label>
                                <textarea class="form-control" th:field="*{reason}" rows="3"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Appointment</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
    function resetForm() {
        const form = document.querySelector('#appointmentModal form');
        form.reset();
        form.querySelector('input[name="id"]').value = '';
        document.getElementById('modalTitle').textContent = 'Book Appointment';
        // Set default datetime to tomorrow same time
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setMinutes(tomorrow.getMinutes() - tomorrow.getTimezoneOffset());
        form.querySelector('input[name="appointmentDate"]').value = tomorrow.toISOString().slice(0, 16);
    }

    document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const form = document.querySelector('#appointmentModal form');
            form.querySelector('input[name="id"]').value = this.dataset.id;
            form.querySelector('select[name="patientId"]').value = this.dataset.patient;
            form.querySelector('select[name="doctorId"]').value = this.dataset.doctor;
            form.querySelector('input[name="appointmentDate"]').value = this.dataset.date;
            form.querySelector('textarea[name="reason"]').value = this.dataset.reason;
            form.querySelector('select[name="status"]').value = this.dataset.status;
            document.getElementById('modalTitle').textContent = 'Edit Appointment';
            new bootstrap.Modal(document.getElementById('appointmentModal')).show();
        });
    });

    // Filter functionality
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');
    const dateFilter = document.getElementById('dateFilter');
    const rows = document.querySelectorAll('#appointmentsTable tbody tr');

    function filterTable() {
        const term = searchInput.value.toLowerCase();
        const status = statusFilter.value;
        const date = dateFilter.value;
        rows.forEach(row => {
            if (row.cells.length < 7) return;
            const text = row.textContent.toLowerCase();
            const rowStatus = row.querySelector('.status-badge')?.textContent.trim() || '';
            const rowDate = row.cells[3]?.textContent.trim() || '';
            let show = term === '' || text.includes(term);
            if (status !== 'all' && rowStatus !== status) show = false;
            if (date) {
                const cellDate = new Date(rowDate).toISOString().slice(0, 10);
                if (cellDate !== date) show = false;
            }
            row.style.display = show ? '' : 'none';
        });
    }

    searchInput.addEventListener('keyup', filterTable);
    statusFilter.addEventListener('change', filterTable);
    dateFilter.addEventListener('change', filterTable);

    function clearFilters() {
        searchInput.value = '';
        statusFilter.value = 'all';
        dateFilter.value = '';
        filterTable();
    }

    function confirmDelete(msg) {
        return confirm(msg || 'Are you sure?');
    }
</script>
</th:block>
</body>
</html>
