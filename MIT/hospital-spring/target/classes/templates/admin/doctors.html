<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Doctors Management</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-user-md me-2"></i>Doctors Management</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#doctorModal" onclick="resetForm()">
            <i class="fas fa-plus-circle me-2"></i>Add New Doctor
        </button>
    </div>

    <!-- Alert Messages -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search & Filter -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Search</label>
                    <input type="text" id="searchInput" class="form-control" placeholder="Name, specialization, phone...">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Specialization</label>
                    <select id="specializationFilter" class="form-select">
                        <option value="all">All Specializations</option>
                        <option th:each="spec : ${specializations}" th:value="${spec}" th:text="${spec}"></option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Doctors Table -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 searchable-table">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Name</th>
                            <th>Specialization</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>License #</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="doctor : ${doctors}">
                            <td th:text="${doctor.id}"></td>
                            <td th:text="${doctor.username}"></td>
                            <td th:text="${doctor.name}"></td>
                            <td>
                                <span class="badge bg-light text-dark" th:text="${doctor.specialization}"></span>
                            </td>
                            <td th:text="${doctor.phone}"></td>
                            <td th:text="${doctor.email} ?: '—'"></td>
                            <td th:text="${doctor.licenseNumber} ?: '—'"></td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary edit-btn"
                                        th:attr="data-id=${doctor.id}, data-username=${doctor.username}, data-name=${doctor.name}, data-specialization=${doctor.specialization}, data-phone=${doctor.phone}, data-email=${doctor.email}, data-license=${doctor.licenseNumber}">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <a th:href="@{/admin/doctors/delete/{id}(id=${doctor.id})}" 
                                   class="btn btn-sm btn-outline-danger" 
                                   onclick="return confirmDelete('Delete this doctor? All related appointments will also be deleted.')">
                                    <i class="fas fa-trash-alt"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${doctors.empty}">
                            <td colspan="8" class="text-center py-4 text-muted">No doctors found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="doctorModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:action="@{/admin/doctors/save}" method="post" th:object="${doctorDto}">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="modalTitle">Add New Doctor</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" th:field="*{id}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label>Username *</label>
                                <input type="text" class="form-control" th:field="*{username}" required>
                            </div>
                            <div class="col-md-6">
                                <label>Password <span id="passReq">*</span></label>
                                <input type="text" class="form-control" th:field="*{password}" placeholder="Leave blank to keep unchanged">
                                <small class="text-muted" id="passwordHelp">Required for new doctors</small>
                            </div>
                            <div class="col-md-6">
                                <label>Full Name *</label>
                                <input type="text" class="form-control" th:field="*{name}" required>
                            </div>
                            <div class="col-md-6">
                                <label>Specialization *</label>
                                <input type="text" class="form-control" th:field="*{specialization}" required>
                            </div>
                            <div class="col-md-6">
                                <label>Phone *</label>
                                <input type="tel" class="form-control" th:field="*{phone}" required>
                            </div>
                            <div class="col-md-6">
                                <label>Email</label>
                                <input type="email" class="form-control" th:field="*{email}">
                            </div>
                            <div class="col-md-6">
                                <label>License Number</label>
                                <input type="text" class="form-control" th:field="*{licenseNumber}">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Doctor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
    function resetForm() {
        const form = document.querySelector('#doctorModal form');
        form.reset();
        form.querySelector('input[name="id"]').value = '';
        document.getElementById('modalTitle').textContent = 'Add New Doctor';
        document.getElementById('passReq').style.display = 'inline';
        document.getElementById('passwordHelp').style.display = 'block';
        form.querySelector('input[name="password"]').required = true;
    }

    document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const form = document.querySelector('#doctorModal form');
            form.querySelector('input[name="id"]').value = this.dataset.id;
            form.querySelector('input[name="username"]').value = this.dataset.username;
            form.querySelector('input[name="password"]').value = '';
            form.querySelector('input[name="name"]').value = this.dataset.name;
            form.querySelector('input[name="specialization"]').value = this.dataset.specialization;
            form.querySelector('input[name="phone"]').value = this.dataset.phone;
            form.querySelector('input[name="email"]').value = this.dataset.email;
            form.querySelector('input[name="licenseNumber"]').value = this.dataset.license;
            
            document.getElementById('modalTitle').textContent = 'Edit Doctor';
            document.getElementById('passReq').style.display = 'none';
            document.getElementById('passwordHelp').style.display = 'none';
            form.querySelector('input[name="password"]').required = false;
            
            new bootstrap.Modal(document.getElementById('doctorModal')).show();
        });
    });

    // Filter functionality (simplified - full version in script.js)
    const searchInput = document.getElementById('searchInput');
    const specializationFilter = document.getElementById('specializationFilter');
    const rows = document.querySelectorAll('.searchable-table tbody tr');

    function filterTable() {
        const term = searchInput.value.toLowerCase();
        const spec = specializationFilter.value;
        rows.forEach(row => {
            if (row.cells.length < 8) return;
            const text = row.textContent.toLowerCase();
            const specialization = row.querySelector('.badge')?.textContent.trim() || '';
            let show = term === '' || text.includes(term);
            if (spec !== 'all' && specialization !== spec) show = false;
            row.style.display = show ? '' : 'none';
        });
    }

    searchInput.addEventListener('keyup', filterTable);
    specializationFilter.addEventListener('change', filterTable);

    function confirmDelete(msg) {
        return confirm(msg || 'Are you sure you want to delete this item?');
    }
</script>
</th:block>
</body>
</html>
