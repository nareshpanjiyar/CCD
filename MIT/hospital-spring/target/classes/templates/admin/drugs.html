<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Drug Inventory</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-pills me-2"></i>Drug Inventory Management</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#drugModal" onclick="resetForm()">
            <i class="fas fa-plus-circle me-2"></i>Add New Drug
        </button>
    </div>

    <!-- Alert Messages -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search & Filter -->
    <div class="filter-section">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label fw-semibold"><i class="fas fa-search me-1"></i>Search Drugs</label>
                <input type="text" id="searchInput" class="form-control" placeholder="Name, category, manufacturer...">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold"><i class="fas fa-filter me-1"></i>Stock Level</label>
                <select id="stockFilter" class="form-select">
                    <option value="all">All Stock Levels</option>
                    <option value="out">Out of Stock (0)</option>
                    <option value="low">Low Stock (< 50)</option>
                    <option value="medium">Medium (50-200)</option>
                    <option value="high">High (> 200)</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold"><i class="fas fa-calendar-alt me-1"></i>Expiry Status</label>
                <select id="expiryFilter" class="form-select">
                    <option value="all">All</option>
                    <option value="expired">Expired</option>
                    <option value="soon">Expiring Soon (30 days)</option>
                    <option value="valid">Valid</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-secondary w-100" onclick="clearFilters()">
                    <i class="fas fa-times me-1"></i>Clear
                </button>
            </div>
        </div>
    </div>

    <!-- Drugs Table -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 searchable-table" id="drugsTable">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Manufacturer</th>
                            <th>Unit Price</th>
                            <th>Stock</th>
                            <th>Expiry Date</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="drug : ${drugs}">
                            <td th:text="${drug.id}"></td>
                            <td th:text="${drug.name}"></td>
                            <td th:text="${drug.category} ?: '—'"></td>
                            <td th:text="${drug.manufacturer} ?: '—'"></td>
                            <td>₹<span th:text="${#numbers.formatDecimal(drug.unitPrice, 1, 2)}"></span></td>
                            <td>
                                <span class="stock-badge" 
                                      th:classappend="${drug.stockQuantity == 0 ? 'stock-low' : (drug.stockQuantity < 50 ? 'stock-low' : (drug.stockQuantity < 200 ? 'stock-medium' : 'stock-high'))}"
                                      th:text="${drug.stockQuantity + ' units'}"></span>
                            </td>
                            <td>
                                <span th:if="${drug.expiryDate}" 
                                      th:class="${#temporals.format(drug.expiryDate, 'yyyy-MM-dd') < #dates.format(new java.util.Date(), 'yyyy-MM-dd') ? 'text-danger fw-bold' : (#temporals.format(drug.expiryDate, 'yyyy-MM-dd') <= #dates.format(new java.util.Date(System.currentTimeMillis() + 30L*24*60*60*1000), 'yyyy-MM-dd') ? 'text-warning fw-bold' : '')}"
                                      th:text="${#temporals.format(drug.expiryDate, 'MMM dd, yyyy')}"></span>
                                <span th:unless="${drug.expiryDate}" class="text-muted">—</span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary edit-btn"
                                        th:attr="data-id=${drug.id}, data-name=${drug.name}, data-category=${drug.category}, data-manufacturer=${drug.manufacturer}, data-price=${drug.unitPrice}, data-stock=${drug.stockQuantity}, data-expiry=${drug.expiryDate} ? ${#temporals.format(drug.expiryDate, 'yyyy-MM-dd')} : '', data-description=${drug.description}">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <a th:href="@{/admin/drugs/delete/{id}(id=${drug.id})}" 
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirmDelete('Delete this drug?')">
                                    <i class="fas fa-trash-alt"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${drugs.empty}">
                            <td colspan="8" class="text-center py-4 text-muted">No drugs found in inventory.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="drugModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:action="@{/admin/drugs/save}" method="post" th:object="${drugDto}">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="modalTitle">Add New Drug</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" th:field="*{id}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label>Drug Name *</label>
                                <input type="text" class="form-control" th:field="*{name}" required>
                            </div>
                            <div class="col-md-6">
                                <label>Category</label>
                                <input type="text" class="form-control" th:field="*{category}" placeholder="e.g., Antibiotic">
                            </div>
                            <div class="col-md-6">
                                <label>Manufacturer</label>
                                <input type="text" class="form-control" th:field="*{manufacturer}">
                            </div>
                            <div class="col-md-3">
                                <label>Unit Price (₹) *</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{unitPrice}" required>
                            </div>
                            <div class="col-md-3">
                                <label>Stock Quantity *</label>
                                <input type="number" class="form-control" th:field="*{stockQuantity}" value="0" required>
                            </div>
                            <div class="col-md-6">
                                <label>Expiry Date</label>
                                <input type="date" class="form-control" th:field="*{expiryDate}">
                            </div>
                            <div class="col-12">
                                <label>Description</label>
                                <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Drug</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
    // Reset form for new drug
    function resetForm() {
        const form = document.querySelector('#drugModal form');
        form.reset();
        form.querySelector('input[name="id"]').value = '';
        document.getElementById('modalTitle').textContent = 'Add New Drug';
        // Set default expiry to +1 year
        const nextYear = new Date();
        nextYear.setFullYear(nextYear.getFullYear() + 1);
        form.querySelector('input[name="expiryDate"]').value = nextYear.toISOString().split('T')[0];
    }

    // Edit button handler
    document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const form = document.querySelector('#drugModal form');
            form.querySelector('input[name="id"]').value = this.dataset.id;
            form.querySelector('input[name="name"]').value = this.dataset.name;
            form.querySelector('input[name="category"]').value = this.dataset.category;
            form.querySelector('input[name="manufacturer"]').value = this.dataset.manufacturer;
            form.querySelector('input[name="unitPrice"]').value = this.dataset.price;
            form.querySelector('input[name="stockQuantity"]').value = this.dataset.stock;
            form.querySelector('input[name="expiryDate"]').value = this.dataset.expiry;
            form.querySelector('textarea[name="description"]').value = this.dataset.description;
            document.getElementById('modalTitle').textContent = 'Edit Drug';
            new bootstrap.Modal(document.getElementById('drugModal')).show();
        });
    });

    // Filter functions
    const searchInput = document.getElementById('searchInput');
    const stockFilter = document.getElementById('stockFilter');
    const expiryFilter = document.getElementById('expiryFilter');
    const rows = document.querySelectorAll('#drugsTable tbody tr');

    function getStockLevel(stock) {
        if (stock == 0) return 'out';
        if (stock < 50) return 'low';
        if (stock < 200) return 'medium';
        return 'high';
    }

    function filterTable() {
        const term = searchInput.value.toLowerCase();
        const stockValue = stockFilter.value;
        const expiryValue = expiryFilter.value;

        rows.forEach(row => {
            if (row.cells.length < 8) return;
            const text = row.textContent.toLowerCase();
            const stockText = row.querySelector('.stock-badge')?.textContent.trim() || '';
            const stock = parseInt(stockText) || 0;
            const expiryCell = row.cells[6];
            const expirySpan = expiryCell.querySelector('span');
            const isExpired = expirySpan?.classList.contains('text-danger') || false;
            const isExpiringSoon = expirySpan?.classList.contains('text-warning') || false;
            const hasExpiry = expirySpan && !expirySpan.classList.contains('text-muted');

            let show = term === '' || text.includes(term);
            if (stockValue !== 'all' && getStockLevel(stock) !== stockValue) show = false;
            if (expiryValue !== 'all') {
                if (expiryValue === 'expired' && !isExpired) show = false;
                else if (expiryValue === 'soon' && !isExpiringSoon) show = false;
                else if (expiryValue === 'valid' && (isExpired || isExpiringSoon || !hasExpiry)) show = false;
            }
            row.style.display = show ? '' : 'none';
        });
    }

    searchInput.addEventListener('keyup', filterTable);
    stockFilter.addEventListener('change', filterTable);
    expiryFilter.addEventListener('change', filterTable);

    function clearFilters() {
        searchInput.value = '';
        stockFilter.value = 'all';
        expiryFilter.value = 'all';
        filterTable();
    }

    function confirmDelete(msg) {
        return confirm(msg || 'Are you sure?');
    }

    // Initialize default expiry on page load
    window.onload = function() {
        const expiryInput = document.querySelector('input[name="expiryDate"]');
        if (expiryInput && !expiryInput.value) {
            const nextYear = new Date();
            nextYear.setFullYear(nextYear.getFullYear() + 1);
            expiryInput.value = nextYear.toISOString().split('T')[0];
        }
    };
</script>
</th:block>
</body>
</html>
