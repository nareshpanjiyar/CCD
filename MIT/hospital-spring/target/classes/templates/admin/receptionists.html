<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Receptionists Management</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-user-tie me-2"></i>Receptionists Management</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#receptionistModal" onclick="resetForm()">
            <i class="fas fa-plus-circle me-2"></i>Add New Receptionist
        </button>
    </div>

    <!-- Alert Messages -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label fw-semibold"><i class="fas fa-search me-1"></i>Search</label>
                    <input type="text" id="searchInput" class="form-control" placeholder="Name, username, phone...">
                </div>
            </div>
        </div>
    </div>

    <!-- Receptionists Table -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 searchable-table">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rec : ${receptionists}">
                            <td th:text="${rec.id}"></td>
                            <td th:text="${rec.username}"></td>
                            <td th:text="${rec.name}"></td>
                            <td th:text="${rec.phone}"></td>
                            <td th:text="${rec.email} ?: '—'"></td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary edit-btn"
                                        th:attr="data-id=${rec.id}, data-username=${rec.username}, data-name=${rec.name}, data-phone=${rec.phone}, data-email=${rec.email}">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <a th:href="@{/admin/receptionists/delete/{id}(id=${rec.id})}" 
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirmDelete('Delete this receptionist?')">
                                    <i class="fas fa-trash-alt"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${receptionists.empty}">
                            <td colspan="6" class="text-center py-4 text-muted">No receptionists found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="receptionistModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/receptionists/save}" method="post" th:object="${receptionistDto}">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title" id="modalTitle">Add New Receptionist</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" th:field="*{id}">
                        <div class="mb-3">
                            <label>Username *</label>
                            <input type="text" class="form-control" th:field="*{username}" required>
                        </div>
                        <div class="mb-3">
                            <label>Password <span id="passReq">*</span></label>
                            <input type="text" class="form-control" th:field="*{password}" placeholder="Leave blank to keep unchanged">
                            <small class="text-muted" id="passwordHelp">Required for new receptionists</small>
                        </div>
                        <div class="mb-3">
                            <label>Full Name *</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        <div class="mb-3">
                            <label>Phone *</label>
                            <input type="tel" class="form-control" th:field="*{phone}" required>
                        </div>
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control" th:field="*{email}">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Receptionist</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
    function resetForm() {
        const form = document.querySelector('#receptionistModal form');
        form.reset();
        form.querySelector('input[name="id"]').value = '';
        document.getElementById('modalTitle').textContent = 'Add New Receptionist';
        document.getElementById('passReq').style.display = 'inline';
        document.getElementById('passwordHelp').style.display = 'block';
        form.querySelector('input[name="password"]').required = true;
    }

    document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const form = document.querySelector('#receptionistModal form');
            form.querySelector('input[name="id"]').value = this.dataset.id;
            form.querySelector('input[name="username"]').value = this.dataset.username;
            form.querySelector('input[name="password"]').value = '';
            form.querySelector('input[name="name"]').value = this.dataset.name;
            form.querySelector('input[name="phone"]').value = this.dataset.phone;
            form.querySelector('input[name="email"]').value = this.dataset.email;
            
            document.getElementById('modalTitle').textContent = 'Edit Receptionist';
            document.getElementById('passReq').style.display = 'none';
            document.getElementById('passwordHelp').style.display = 'none';
            form.querySelector('input[name="password"]').required = false;
            
            new bootstrap.Modal(document.getElementById('receptionistModal')).show();
        });
    });

    // Simple search filter
    const searchInput = document.getElementById('searchInput');
    const rows = document.querySelectorAll('.searchable-table tbody tr');
    searchInput.addEventListener('keyup', function() {
        const term = this.value.toLowerCase();
        rows.forEach(row => {
            if (row.cells.length < 6) return;
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(term) ? '' : 'none';
        });
    });

    function confirmDelete(msg) {
        return confirm(msg || 'Are you sure?');
    }
</script>
</th:block>
</body>
</html>
