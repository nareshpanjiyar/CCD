<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Patient History</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4"><i class="fas fa-history me-2"></i>Patient History</h2>

    <!-- Patient Selector -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" class="row g-3 align-items-end">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Select Patient</label>
                    <select class="form-select" name="patientId" onchange="this.form.submit()">
                        <option value="">-- Choose a patient --</option>
                        <option th:each="p : ${patients}" th:value="${p.id}" 
                                th:selected="${selectedPatient != null && selectedPatient.id == p.id}"
                                th:text="${p.name}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">View History</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${selectedPatient}">
        <!-- Patient Info Header -->
        <div class="patient-header mb-4 p-4 bg-gradient text-white rounded" style="background: linear-gradient(135deg, #667eea, #764ba2);">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h3 th:text="${selectedPatient.name}"></h3>
                    <div class="row">
                        <div class="col-md-3"><i class="fas fa-calendar-alt me-2"></i><span th:text="${selectedPatient.age} + ' years'"></span></div>
                        <div class="col-md-3"><i class="fas fa-venus-mars me-2"></i><span th:text="${selectedPatient.gender}"></span></div>
                        <div class="col-md-3"><i class="fas fa-phone me-2"></i><span th:text="${selectedPatient.phone}"></span></div>
                        <div class="col-md-3"><i class="fas fa-tint me-2"></i><span th:text="${selectedPatient.bloodGroup} ?: 'Unknown'"></span></div>
                    </div>
                </div>
                <div class="col-md-4 text-md-end">
                    <a th:href="@{/doctor/prescriptions/new(patientId=${selectedPatient.id})}" class="btn btn-light">
                        <i class="fas fa-prescription me-1"></i>Write Prescription
                    </a>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#appointments">Appointment History</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#prescriptions">Prescription History</button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Appointments Tab -->
            <div class="tab-pane fade show active" id="appointments">
                <div th:if="${appointments.empty}" class="alert alert-info">No appointment history.</div>
                <div th:each="appt : ${appointments}" class="timeline-item mb-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h5 th:text="${#temporals.format(appt.appointmentDate, 'MMMM d, yyyy')}"></h5>
                                    <p class="text-muted">
                                        <i class="far fa-clock me-1"></i><span th:text="${#temporals.format(appt.appointmentDate, 'hh:mm a')}"></span>
                                        <span class="mx-2">|</span>
                                        <i class="fas fa-user-md me-1"></i><span th:text="${appt.doctor.name}"></span>
                                    </p>
                                    <p><strong>Reason:</strong> <span th:text="${appt.reason} ?: 'Not specified'"></span></p>
                                </div>
                                <span class="badge" th:classappend="|bg-${appt.status == 'Scheduled' ? 'primary' : (appt.status == 'Completed' ? 'success' : 'danger')}|"
                                      th:text="${appt.status}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Prescriptions Tab -->
            <div class="tab-pane fade" id="prescriptions">
                <div th:if="${prescriptions.empty}" class="alert alert-info">No prescription history.</div>
                <div th:each="presc : ${prescriptions}" class="card border-0 shadow-sm mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h5>Prescription #<span th:text="${presc.id}"></span></h5>
                                <p class="text-muted">
                                    <i class="far fa-calendar-alt me-1"></i><span th:text="${#temporals.format(presc.prescriptionDate, 'MMMM d, yyyy')}"></span>
                                    <span class="mx-2">|</span>
                                    <i class="fas fa-user-md me-1"></i><span th:text="${presc.doctor.name} + ' (' + ${presc.doctor.specialization} + ')'"></span>
                                </p>
                            </div>
                            <span class="badge" th:classappend="|bg-${presc.status == 'Active' ? 'success' : 'secondary'}|"
                                  th:text="${presc.status}"></span>
                        </div>
                        <p><strong>Diagnosis:</strong> <span th:text="${presc.diagnosis} ?: 'Not recorded'"></span></p>
                        <div th:if="${not presc.items.empty}">
                            <h6 class="mt-3">Medications</h6>
                            <table class="table table-sm">
                                <thead><tr><th>Drug</th><th>Dosage</th><th>Frequency</th><th>Duration</th></tr></thead>
                                <tbody>
                                    <tr th:each="item : ${presc.items}">
                                        <td th:text="${item.drug.name}"></td>
                                        <td th:text="${item.dosage}"></td>
                                        <td th:text="${item.frequency}"></td>
                                        <td th:text="${item.duration}"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <p th:if="${presc.notes}"><strong>Notes:</strong> <span th:text="${presc.notes}"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
