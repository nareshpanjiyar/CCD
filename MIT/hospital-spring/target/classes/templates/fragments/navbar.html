<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- Top Navbar Fragment -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm" th:fragment="navbar">
        <div class="container-fluid">
            <!-- Sidebar Toggle Button -->
            <button type="button" id="sidebarCollapse" class="btn btn-outline-secondary">
                <i class="fas fa-bars"></i>
            </button>

            <!-- Page Title (optional, can be passed as parameter) -->
            <span class="navbar-brand ms-3 d-none d-md-block" th:text="${pageTitle} ?: 'Dashboard'"></span>

            <!-- Right Side: User Info & Logout -->
            <div class="ms-auto d-flex align-items-center">
                <span class="navbar-text me-3">
                    <i class="fas fa-user-circle me-1"></i>
                    Welcome, <strong sec:authentication="name"></strong>
                    <span class="badge bg-primary ms-2 text-uppercase" sec:authentication="principal.authorities"></span>
                </span>
                <!-- Optional quick logout button (logout is also in sidebar) -->
                <a th:href="@{/logout}" class="btn btn-sm btn-outline-danger">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>
    </nav>
</body>
</html>
