<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- Doctor Sidebar Fragment -->
    <nav id="sidebar" class="bg-dark text-white" th:fragment="sidebar-doctor">
        <div class="sidebar-header p-3">
            <h4><i class="fas fa-user-md me-2"></i>Doctor Portal</h4>
        </div>
        <ul class="list-unstyled components">
            <li th:classappend="${#strings.contains(currentPage, 'dashboard')} ? 'active'">
                <a th:href="@{/doctor/dashboard}">
                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                </a>
            </li>
            <li th:classappend="${#strings.contains(currentPage, 'appointments')} ? 'active'">
                <a th:href="@{/doctor/appointments}">
                    <i class="fas fa-calendar-check me-2"></i>My Appointments
                </a>
            </li>
            <li th:classappend="${#strings.contains(currentPage, 'prescriptions')} ? 'active'">
                <a th:href="@{/doctor/prescriptions}">
                    <i class="fas fa-prescription-bottle me-2"></i>Prescriptions
                </a>
            </li>
            <li th:classappend="${#strings.contains(currentPage, 'patient-history')} ? 'active'">
                <a th:href="@{/doctor/patient-history}">
                    <i class="fas fa-history me-2"></i>Patient History
                </a>
            </li>
            <li>
                <a th:href="@{/logout}">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </a>
            </li>
        </ul>
    </nav>
</body>
</html>
