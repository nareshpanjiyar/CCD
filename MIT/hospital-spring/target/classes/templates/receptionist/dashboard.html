<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Receptionist Dashboard</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4"><i class="fas fa-user-tie me-2"></i>Receptionist Dashboard</h2>

    <!-- Stats Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3 col-sm-6">
            <div class="card stats-card bg-primary text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Total Patients</h6>
                            <h2 class="mb-0" th:text="${totalPatients}"></h2>
                        </div>
                        <i class="fas fa-users fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6">
            <div class="card stats-card bg-success text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Today's Appointments</h6>
                            <h2 class="mb-0" th:text="${todayAppointments}"></h2>
                        </div>
                        <i class="fas fa-calendar-check fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6">
            <div class="card stats-card bg-warning text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Pending Bills</h6>
                            <h2 class="mb-0" th:text="${pendingBills}"></h2>
                        </div>
                        <i class="fas fa-file-invoice fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6">
            <div class="card stats-card bg-info text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Admitted Patients</h6>
                            <h2 class="mb-0" th:text="${admittedPatients}"></h2>
                        </div>
                        <i class="fas fa-procedures fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="row g-3">
        <div class="col-md-3">
            <a th:href="@{/receptionist/register-patient}" class="text-decoration-none">
                <div class="card bg-light border-0 shadow-sm hover-shadow">
                    <div class="card-body text-center py-4">
                        <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
                        <h5>Register Patient</h5>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-3">
            <a th:href="@{/receptionist/appointments}" class="text-decoration-none">
                <div class="card bg-light border-0 shadow-sm hover-shadow">
                    <div class="card-body text-center py-4">
                        <i class="fas fa-calendar-plus fa-3x text-success mb-3"></i>
                        <h5>Book Appointment</h5>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-3">
            <a th:href="@{/receptionist/billing}" class="text-decoration-none">
                <div class="card bg-light border-0 shadow-sm hover-shadow">
                    <div class="card-body text-center py-4">
                        <i class="fas fa-file-invoice-dollar fa-3x text-warning mb-3"></i>
                        <h5>Generate Bill</h5>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-3">
            <a th:href="@{/receptionist/admissions}" class="text-decoration-none">
                <div class="card bg-light border-0 shadow-sm hover-shadow">
                    <div class="card-body text-center py-4">
                        <i class="fas fa-procedures fa-3x text-info mb-3"></i>
                        <h5>Admissions/Discharge</h5>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
